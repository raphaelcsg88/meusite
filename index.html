<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meu Site</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    color:#333;
}

header{
    background:#1f2937;
    color:white;
    padding:40px 20px;
    text-align:center;
}

header h1{
    font-size:2.4rem;
    margin-bottom:10px;
}

header p{
    opacity:0.9;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:24px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    transition:.2s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin-bottom:16px;
}

.btn{
    display:inline-block;
    padding:10px 18px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.btn:hover{
    background:#1d4ed8;
}

footer{
    text-align:center;
    padding:30px;
    color:#777;
}

</style>

</head>

<body>

<header>
    <h1>Bem-vindo ao Meu Site</h1>
    <p>Página inicial hospedada no GitHub Pages</p>
</header>

<section class="container">

    <div class="cards">

        <div class="card">
            <h3>Projeto 1</h3>
            <p>Descrição breve do conteúdo desta área.</p>
            <a class="btn" href="#">Abrir</a>
        </div>

        <div class="card">
            <h3>Projeto 2</h3>
            <p>Outra seção para organizar informações.</p>
            <a class="btn" href="#">Abrir</a>
        </div>

        <div class="card">
            <h3>Documentação</h3>
            <p>Área para guias, processos ou arquivos.</p>
            <a class="btn" href="#">Abrir</a>
        </div>

    </div>

</section>

<footer>
    © 2026 - Meu Site
</footer>

</body>
</html>
